name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Debug build (all targets)
        run: swift build

      - name: Headless test suite
        run: swift run MinesweeperTests

      - name: Release build
        run: swift build -c release --product Minesweeper

      - name: Build app bundle
        run: make bundle

      - name: Zip app bundle
        run: ditto -c -k --sequesterRsrc --keepParent build/Minesweeper.app Minesweeper.zip

      - name: Upload build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: Minesweeper-macOS
          path: Minesweeper.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" Minesweeper.zip --title "$TAG_NAME" --generate-notes
